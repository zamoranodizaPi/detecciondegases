[hardware]
i2c_bus = 1
oxygen_address = 0x73
mics_enabled = true
mics_path = /sys/bus/iio/devices/iio:device0
framebuffer = /dev/fb1
display_width = 480
display_height = 320
display_rotate = 0

[network]
mode = dhcp
static_ip = 192.168.1.100
gateway = 192.168.1.1
dns = 8.8.8.8

[web]
port = 8080
username = admin
password = admin

[modbus]
enabled = true
port = 5020

[sampling]
samples = 10
interval = 1
publish_window = 5
oxygen_max_jump = 1.5
co_max_jump = 30
no2_max_jump = 1.0
nh3_max_jump = 8.0

[calibration]
oxygen_factor = 0.75
co_factor = 1.0
no2_factor = 1.0
nh3_factor = 1.0

[alarms]
oxygen_low = 19.5
oxygen_high = 23.5
co_high = 50

[system]
first_run = true
device_name = GasMonitor
log_file = logs/system.log
